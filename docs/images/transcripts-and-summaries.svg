<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">RepeaterWatch transcript and summary preview</title>
  <desc id="desc">A sanitized preview of searchable transcripts and timeline summaries in RepeaterWatch.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .panel { fill: #ffffff; stroke: #d8e0ea; stroke-width: 1.5; }
      .header { fill: #1f2937; }
      .title { font: 700 32px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 17px "Segoe UI", Arial, sans-serif; fill: #5f6c7b; }
      .h2 { font: 700 21px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .label { font: 600 15px "Segoe UI", Arial, sans-serif; fill: #475569; }
      .text { font: 400 15px "Segoe UI", Arial, sans-serif; fill: #273244; }
      .muted { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .chip { fill: #eef4ff; stroke: #c9dcff; }
      .chipText { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #1d4ed8; }
      .hit { fill: #fff3bf; }
      .line { stroke: #cbd5e1; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="64" y="78">Find what happened later</text>
  <text class="subtitle" x="64" y="110">Search transcripts, highlight keywords, and review summaries as a repeater timeline.</text>

  <rect class="panel" x="64" y="150" width="512" height="520" rx="18"/>
  <rect class="header" x="64" y="150" width="512" height="72" rx="18"/>
  <rect class="header" x="64" y="190" width="512" height="32"/>
  <text class="h2" x="92" y="195" fill="#ffffff">Transcripts</text>
  <rect x="92" y="242" width="396" height="42" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text class="muted" x="112" y="268">Search callsigns, words, or repeater names</text>
  <rect class="chip" x="500" y="242" width="46" height="42" rx="10"/>
  <text class="chipText" x="513" y="268">Go</text>

  <rect class="panel" x="92" y="310" width="428" height="86" rx="12"/>
  <text class="label" x="116" y="338">14:32 - Local 2m Repeater</text>
  <text class="text" x="116" y="366">K0ABC checked into the evening net.</text>
  <rect class="hit" x="116" y="350" width="54" height="22" rx="4"/>
  <text class="text" x="116" y="366">K0ABC</text>
  <text class="muted" x="116" y="386">Audio retained - 18 seconds</text>

  <rect class="panel" x="92" y="414" width="428" height="86" rx="12"/>
  <text class="label" x="116" y="442">14:46 - Regional Weather Net</text>
  <text class="text" x="116" y="470">Weather report: light rain moving east.</text>
  <rect class="hit" x="214" y="454" width="58" height="22" rx="4"/>
  <text class="text" x="116" y="470">Weather report: light rain moving east.</text>
  <text class="muted" x="116" y="490">Audio retained - 31 seconds</text>

  <rect class="panel" x="92" y="518" width="428" height="86" rx="12"/>
  <text class="label" x="116" y="546">15:02 - Local 2m Repeater</text>
  <text class="text" x="116" y="574">[static only]</text>
  <text class="muted" x="116" y="594">Static-only recordings can be cleared separately.</text>

  <rect class="panel" x="624" y="150" width="512" height="520" rx="18"/>
  <rect class="header" x="624" y="150" width="512" height="72" rx="18"/>
  <rect class="header" x="624" y="190" width="512" height="32"/>
  <text class="h2" x="652" y="195" fill="#ffffff">Summary Timeline</text>
  <rect class="chip" x="652" y="242" width="84" height="34" rx="17"/>
  <text class="chipText" x="674" y="264">15 min</text>
  <rect class="chip" x="748" y="242" width="70" height="34" rx="17"/>
  <text class="chipText" x="773" y="264">Hour</text>
  <rect class="chip" x="830" y="242" width="64" height="34" rx="17"/>
  <text class="chipText" x="853" y="264">Day</text>

  <line class="line" x1="684" y1="316" x2="684" y2="600"/>
  <circle cx="684" cy="336" r="9" fill="#2563eb"/>
  <rect class="panel" x="714" y="304" width="354" height="84" rx="12"/>
  <text class="label" x="738" y="332">14:00-15:00</text>
  <text class="text" x="738" y="360">Two check-ins and one weather report.</text>
  <text class="muted" x="738" y="380">3 source transcripts</text>

  <circle cx="684" cy="448" r="9" fill="#60a5fa"/>
  <rect class="panel" x="714" y="416" width="354" height="84" rx="12"/>
  <text class="label" x="738" y="444">13:00-14:00</text>
  <text class="text" x="738" y="472">Repeater IDs only; no user traffic.</text>
  <text class="muted" x="738" y="492">Automated traffic suppressed from alerts</text>

  <circle cx="684" cy="560" r="9" fill="#93c5fd"/>
  <rect class="panel" x="714" y="528" width="354" height="84" rx="12"/>
  <text class="label" x="738" y="556">12:00-13:00</text>
  <text class="text" x="738" y="584">No activity heard.</text>
  <text class="muted" x="738" y="604">Generated on the hour</text>
</svg>
