<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">RepeaterWatch home dashboard preview</title>
  <desc id="desc">A sanitized preview of the RepeaterWatch home dashboard with receiver status, last heard transcript, summary, and activity chart.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7f9; }
      .panel { fill: #ffffff; stroke: #d9e0e7; stroke-width: 1.5; }
      .phone { fill: #111827; }
      .screen { fill: #f7faf9; }
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px "Segoe UI", Arial, sans-serif; fill: #536174; }
      .label { font: 600 16px "Segoe UI", Arial, sans-serif; fill: #536174; }
      .body { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #162033; }
      .small { font: 400 14px "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .pill { fill: #e7f0ff; stroke: #bfd4ff; }
      .pillText { font: 600 14px "Segoe UI", Arial, sans-serif; fill: #174ea6; }
      .accent { fill: #2563eb; }
      .navActive { fill: #1f2937; }
      .navText { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .navMuted { font: 500 13px "Segoe UI", Arial, sans-serif; fill: #435266; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <rect x="60" y="64" width="1080" height="632" rx="32" fill="#e9eef5"/>
  <text class="title" x="92" y="122">Monitor repeaters from a Pi</text>
  <text class="subtitle" x="92" y="155">Live receiver health, recent traffic, summaries, and activity at a glance.</text>

  <rect class="phone" x="430" y="42" width="340" height="676" rx="38"/>
  <rect class="screen" x="448" y="66" width="304" height="628" rx="26"/>

  <rect class="panel" x="466" y="86" width="132" height="74" rx="10"/>
  <text class="small" x="480" y="112">Receivers</text>
  <text class="body" x="480" y="140">2</text>
  <rect class="panel" x="614" y="86" width="120" height="74" rx="10"/>
  <text class="small" x="628" y="112">Recordings</text>
  <text class="body" x="628" y="140">18</text>

  <rect class="panel" x="466" y="174" width="268" height="126" rx="12"/>
  <text class="label" x="482" y="204">Receiver</text>
  <rect class="pill" x="655" y="190" width="62" height="26" rx="13"/>
  <text class="pillText" x="668" y="208">running</text>
  <text class="body" x="482" y="234">2/2 active</text>
  <text class="small" x="482" y="260">Local 2m Repeater</text>
  <text class="small" x="482" y="282">146.940000 MHz</text>

  <rect class="panel" x="466" y="314" width="268" height="118" rx="12"/>
  <text class="label" x="482" y="344">Last Heard</text>
  <text class="body" x="482" y="374">Today, 14:32</text>
  <text class="small" x="482" y="400">K0ABC checked into the net.</text>

  <rect class="panel" x="466" y="446" width="268" height="122" rx="12"/>
  <text class="label" x="482" y="476">Latest Summary</text>
  <text class="body" x="482" y="506">Hourly summary</text>
  <text class="small" x="482" y="532">Routine check-ins, repeater ID,</text>
  <text class="small" x="482" y="552">and one weather report.</text>

  <rect class="panel" x="466" y="582" width="268" height="64" rx="12"/>
  <text class="label" x="482" y="610">Activity</text>
  <rect x="482" y="624" width="8" height="12" fill="#cbd5e1"/>
  <rect x="496" y="612" width="8" height="24" fill="#93c5fd"/>
  <rect x="510" y="618" width="8" height="18" fill="#bfdbfe"/>
  <rect x="524" y="600" width="8" height="36" fill="#2563eb"/>
  <rect x="538" y="628" width="8" height="8" fill="#cbd5e1"/>
  <rect x="552" y="608" width="8" height="28" fill="#60a5fa"/>
  <rect x="566" y="620" width="8" height="16" fill="#bfdbfe"/>
  <rect x="580" y="604" width="8" height="32" fill="#3b82f6"/>
  <rect x="594" y="630" width="8" height="6" fill="#cbd5e1"/>

  <rect x="448" y="654" width="304" height="40" rx="0" fill="#ffffff"/>
  <rect class="navActive" x="466" y="662" width="66" height="24" rx="8"/>
  <text class="navText" x="481" y="679">Home</text>
  <text class="navMuted" x="558" y="679">Transcript</text>
  <text class="navMuted" x="646" y="679">Summary</text>
  <text class="navMuted" x="710" y="679">More</text>

  <rect class="panel" x="92" y="216" width="276" height="118" rx="16"/>
  <text class="label" x="118" y="254">Local-first</text>
  <text class="small" x="118" y="284">Runs on a Raspberry Pi with</text>
  <text class="small" x="118" y="306">SQLite storage and no build step.</text>
  <rect class="accent" x="118" y="318" width="76" height="4" rx="2"/>

  <rect class="panel" x="832" y="216" width="276" height="118" rx="16"/>
  <text class="label" x="858" y="254">PWA controls</text>
  <text class="small" x="858" y="284">Tune repeaters, search transcripts,</text>
  <text class="small" x="858" y="306">and manage notifications.</text>
  <rect class="accent" x="858" y="318" width="76" height="4" rx="2"/>
</svg>
