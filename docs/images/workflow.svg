<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">RepeaterWatch workflow diagram</title>
  <desc id="desc">RTL-SDR audio flows through VOX segmentation, recording storage, transcription, summaries, and optional notifications.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f6f8fb; }
      .box { fill: #ffffff; stroke: #d8e0ea; stroke-width: 1.5; }
      .accent { fill: #eef4ff; stroke: #c9dcff; stroke-width: 1.5; }
      .title { font: 700 30px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .label { font: 700 17px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .small { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .arrow { stroke: #64748b; stroke-width: 2.2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="420"/>
  <text class="title" x="64" y="72">How RepeaterWatch handles traffic</text>

  <rect class="accent" x="64" y="128" width="146" height="112" rx="18"/>
  <text class="label" x="96" y="168">RTL-SDR</text>
  <text class="small" x="88" y="196">rtl_fm or shared</text>
  <text class="small" x="98" y="214">IQ receiver</text>

  <line class="arrow" x1="220" y1="184" x2="282" y2="184"/>
  <rect class="box" x="296" y="128" width="146" height="112" rx="18"/>
  <text class="label" x="336" y="168">VOX</text>
  <text class="small" x="320" y="196">pre-roll and</text>
  <text class="small" x="318" y="214">post-silence</text>

  <line class="arrow" x1="452" y1="184" x2="514" y2="184"/>
  <rect class="box" x="528" y="128" width="146" height="112" rx="18"/>
  <text class="label" x="566" y="168">Record</text>
  <text class="small" x="556" y="196">WAV audio</text>
  <text class="small" x="550" y="214">and metadata</text>

  <line class="arrow" x1="684" y1="184" x2="746" y2="184"/>
  <rect class="box" x="760" y="128" width="146" height="112" rx="18"/>
  <text class="label" x="790" y="168">Transcribe</text>
  <text class="small" x="792" y="196">local Whisper or</text>
  <text class="small" x="792" y="214">remote API</text>

  <line class="arrow" x1="916" y1="184" x2="978" y2="184"/>
  <rect class="box" x="992" y="128" width="146" height="112" rx="18"/>
  <text class="label" x="1022" y="168">Summarize</text>
  <text class="small" x="1030" y="196">15 min, hour,</text>
  <text class="small" x="1048" y="214">and day</text>

  <line class="arrow" x1="833" y1="250" x2="833" y2="304"/>
  <rect class="accent" x="694" y="316" width="278" height="58" rx="16"/>
  <text class="label" x="748" y="350">Keyword notifications</text>
  <text class="small" x="756" y="368">with cooldowns and suppression</text>
</svg>
